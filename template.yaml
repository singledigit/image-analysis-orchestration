AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CVPR 2026 — Durable image analysis pipeline demo

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 900
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
        MODEL_ID: "amazon.nova-lite-v1:0"
        LOG_LEVEL: INFO

Resources:

  # ── AppSync Events API ────────────────────────────────────────────

  RealtimeApi:
    Type: AWS::AppSync::Api
    Properties:
      Name: cvpr-pipeline-events
      EventConfig:
        AuthProviders:
          - AuthType: API_KEY
        ConnectionAuthModes:
          - AuthType: API_KEY
        DefaultPublishAuthModes:
          - AuthType: API_KEY
        DefaultSubscribeAuthModes:
          - AuthType: API_KEY

  RealtimeApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt RealtimeApi.ApiId

  PipelineChannel:
    Type: AWS::AppSync::ChannelNamespace
    Properties:
      ApiId: !GetAtt RealtimeApi.ApiId
      Name: pipeline

  # ── S3 bucket for image uploads ──────────────────────────────────

  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cvpr-images-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-uploads
            Status: Enabled
            ExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [PUT]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  # ── HTTP API ──────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [POST, OPTIONS]
        AllowHeaders: [Content-Type]

  # ── API handler — async invoke + return AppSync connection info ───

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cvpr-api
      Handler: handler.handler
      CodeUri: src/api/
      Timeout: 10
      Environment:
        Variables:
          PIPELINE_FUNCTION_ARN: !Ref ImageAnalysisPipeline.Alias
          IMAGE_BUCKET: !Ref ImageBucket
          REALTIME_ENDPOINT: !Sub "https://${RealtimeApi.Dns.Http}/event"
          REALTIME_WS_ENDPOINT: !Sub "wss://${RealtimeApi.Dns.Realtime}/event/realtime"
          REALTIME_API_KEY: !GetAtt RealtimeApiKey.ApiKey
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ImageBucket
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt ImageAnalysisPipeline.Arn
                - !Sub "${ImageAnalysisPipeline.Arn}:*"
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /upload
            Method: POST
        Analyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /analyze
            Method: POST
        Options:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /{proxy+}
            Method: OPTIONS
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints: [handler.ts]

  # ── Durable pipeline function ─────────────────────────────────────

  ImageAnalysisPipeline:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cvpr-image-analysis-pipeline
      Handler: handler.handler
      CodeUri: src/image-analysis-pipeline/
      AutoPublishAlias: demo
      Environment:
        Variables:
          IMAGE_BUCKET: !Ref ImageBucket
          REALTIME_ENDPOINT: !Sub "https://${RealtimeApi.Dns.Http}/event"
          REALTIME_API_KEY: !GetAtt RealtimeApiKey.ApiKey
      DurableConfig:
        ExecutionTimeout: 900
        RetentionPeriodInDays: 1
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"   # Bedrock has no SAM policy template; scoped by action
        - S3ReadPolicy:
            BucketName: !Ref ImageBucket
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: appsync:EventPublish
              Resource: !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/${RealtimeApi.ApiId}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints: [handler.ts]

  # ── Log groups ────────────────────────────────────────────────────

  PipelineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ImageAnalysisPipeline}"
      RetentionInDays: 1

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: 1

Outputs:

  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com/analyze"

  RealtimeEndpoint:
    Description: AppSync Events HTTP endpoint
    Value: !Sub "https://${RealtimeApi.Dns.Http}/event"

  RealtimeWsEndpoint:
    Description: AppSync Events WebSocket endpoint
    Value: !Sub "wss://${RealtimeApi.Dns.Realtime}/event/realtime"

  RealtimeApiKey:
    Description: AppSync Events API key
    Value: !GetAtt RealtimeApiKey.ApiKey

  FunctionArn:
    Description: Unqualified function ARN
    Value: !GetAtt ImageAnalysisPipeline.Arn

  AliasArn:
    Description: Qualified alias ARN — use this to invoke
    Value: !Ref ImageAnalysisPipeline.Alias

  StackName:
    Value: !Ref AWS::StackName
