AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CVPR 2026 — Durable image analysis pipeline demo

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures: [arm64]
    Timeout: 900
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
        MODEL_ID: "amazon.nova-lite-v1:0"
        LOG_LEVEL: INFO

Resources:

  # ── AppSync Events API ────────────────────────────────────────────

  RealtimeApi:
    Type: AWS::AppSync::Api
    Properties:
      Name: cvpr-pipeline-events
      EventConfig:
        AuthProviders:
          - AuthType: API_KEY
        ConnectionAuthModes:
          - AuthType: API_KEY
        DefaultPublishAuthModes:
          - AuthType: API_KEY
        DefaultSubscribeAuthModes:
          - AuthType: API_KEY

  RealtimeApiKey:
    Type: AWS::AppSync::ApiKey
    Properties:
      ApiId: !GetAtt RealtimeApi.ApiId

  PipelineChannel:
    Type: AWS::AppSync::ChannelNamespace
    Properties:
      ApiId: !GetAtt RealtimeApi.ApiId
      Name: pipeline

  # ── DynamoDB — results store ──────────────────────────────────────

  ResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: cvpr-results
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: imageId
          AttributeType: S
      KeySchema:
        - AttributeName: imageId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── S3 bucket for image uploads ──────────────────────────────────

  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cvpr-images-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: expire-uploads
            Status: Enabled
            ExpirationInDays: 7   # keep long enough for dashboard thumbnails
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  # ── Cognito User Pool — admin-only, no self-signup ───────────────

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: cvpr-demo-users
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: cvpr-demo-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      AccessTokenValidity: 8
      TokenValidityUnits:
        AccessToken: hours

  # ── HTTP API ──────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: [GET, POST, DELETE, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient

  # ── API handler ───────────────────────────────────────────────────

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cvpr-api
      Handler: handler.handler
      CodeUri: src/api/
      Timeout: 10
      Environment:
        Variables:
          PIPELINE_FUNCTION_ARN: !Ref ImageAnalysisPipeline.Alias
          IMAGE_BUCKET: !Ref ImageBucket
          RESULTS_TABLE: !Ref ResultsTable
          REALTIME_ENDPOINT: !Sub "https://${RealtimeApi.Dns.Http}/event"
          REALTIME_WS_ENDPOINT: !Sub "wss://${RealtimeApi.Dns.Realtime}/event/realtime"
          REALTIME_API_KEY: !GetAtt RealtimeApiKey.ApiKey
          USER_POOL_ID: !Ref UserPool
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ImageBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ResultsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt ImageAnalysisPipeline.Arn
                - !Sub "${ImageAnalysisPipeline.Arn}:*"
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /upload
            Method: POST
        Analyze:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /analyze
            Method: POST
        GetResults:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /results
            Method: GET
        GetResult:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /results/{imageId}
            Method: GET
        DeleteResult:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /results/{imageId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer
        Options:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /{proxy+}
            Method: OPTIONS
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints: [handler.ts]

  # ── Durable pipeline function ─────────────────────────────────────

  ImageAnalysisPipeline:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: cvpr-image-analysis-pipeline
      Handler: handler.handler
      CodeUri: src/image-analysis-pipeline/
      AutoPublishAlias: demo
      Environment:
        Variables:
          IMAGE_BUCKET: !Ref ImageBucket
          RESULTS_TABLE: !Ref ResultsTable
          CDN_DOMAIN: !Sub "${FrontendDistribution.DomainName}"
          REALTIME_ENDPOINT: !Sub "https://${RealtimeApi.Dns.Http}/event"
          REALTIME_API_KEY: !GetAtt RealtimeApiKey.ApiKey
      DurableConfig:
        ExecutionTimeout: 900
        RetentionPeriodInDays: 1
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy
        - S3ReadPolicy:
            BucketName: !Ref ImageBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref ResultsTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: "*"
            - Effect: Allow
              Action: appsync:EventPublish
              Resource: !Sub "arn:aws:appsync:${AWS::Region}:${AWS::AccountId}:apis/${RealtimeApi.ApiId}"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2022
        Sourcemap: true
        EntryPoints: [handler.ts]

  # ── Frontend hosting: S3 + CloudFront (no caching) ───────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cvpr-frontend-${AWS::AccountId}"

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  # Allow CloudFront to read uploaded images directly from ImageBucket
  ImageBucketCFPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImageBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ImageBucket.Arn}/uploads/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt FrontendOAC.Id
          - Id: ImageS3
            DomainName: !GetAtt ImageBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        # /uploads/* served from ImageBucket with caching enabled (images don't change)
        CacheBehaviors:
          - PathPattern: /uploads/*
            TargetOriginId: ImageS3
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            AllowedMethods: [GET, HEAD]
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad       # CachingDisabled
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf # CORS-S3Origin
          AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        HttpVersion: http2
        PriceClass: PriceClass_100

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "cvpr-frontend-oac-${AWS::AccountId}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── Log groups ────────────────────────────────────────────────────

  PipelineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ImageAnalysisPipeline}"
      RetentionInDays: 1

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ApiFunction}"
      RetentionInDays: 1

Outputs:

  ApiBase:
    Description: HTTP API base URL
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"

  RealtimeEndpoint:
    Description: AppSync Events HTTP endpoint
    Value: !Sub "https://${RealtimeApi.Dns.Http}/event"

  RealtimeWsEndpoint:
    Description: AppSync Events WebSocket endpoint
    Value: !Sub "wss://${RealtimeApi.Dns.Realtime}/event/realtime"

  RealtimeApiKey:
    Description: AppSync Events API key
    Value: !GetAtt RealtimeApiKey.ApiKey

  FrontendUrl:
    Description: CloudFront URL for the frontend
    Value: !Sub "https://${FrontendDistribution.DomainName}"

  FrontendBucket:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket

  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool

  UserPoolClientId:
    Description: Cognito User Pool Client ID
    Value: !Ref UserPoolClient

  StackName:
    Value: !Ref AWS::StackName
